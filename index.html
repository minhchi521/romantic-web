<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thiên Nhiên & Tình Yêu 🌸</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0a0a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
  }

  /* ===== STAGE ===== */
  #stage {
    width: 700px;
    height: 500px;
    border-radius: 28px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
    user-select: none;
    box-shadow: 0 0 80px rgba(255,182,193,0.25), 0 0 160px rgba(135,206,235,0.1);
  }

  /* ===== SKY ===== */
  #sky {
    position: absolute; inset: 0;
    background: linear-gradient(180deg,
      #1a0533 0%, #2d1b69 20%, #c2185b 50%, #ff8a65 70%, #ffcc02 85%, #fffde7 100%);
    transition: background 1.8s ease;
  }
  #stage.day #sky {
    background: linear-gradient(180deg,
      #1565c0 0%, #42a5f5 30%, #81d4fa 60%, #b3e5fc 80%, #e1f5fe 100%);
  }

  /* ===== STARS ===== */
  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.2;transform:scale(0.5)}
  }
  #stage.day .star { opacity: 0; transition: opacity 1.5s; }

  /* ===== SUN / MOON ===== */
  #sun {
    position: absolute;
    width: 65px; height: 65px;
    border-radius: 50%;
    background: #FFD600;
    top: 60px; right: 90px;
    box-shadow: 0 0 0 12px rgba(255,214,0,0.15), 0 0 0 28px rgba(255,214,0,0.07);
    transition: all 1.8s ease;
    animation: sunPulse 4s ease-in-out infinite;
  }
  @keyframes sunPulse {
    0%,100%{box-shadow:0 0 0 12px rgba(255,214,0,0.15),0 0 0 28px rgba(255,214,0,0.07)}
    50%{box-shadow:0 0 0 20px rgba(255,214,0,0.2),0 0 0 44px rgba(255,214,0,0.08)}
  }

  /* sun rays */
  .ray {
    position: absolute;
    width: 4px; height: 22px;
    background: rgba(255,214,0,0.5);
    border-radius: 2px;
    top: 50%; left: 50%;
    transform-origin: 50% calc(42px);
    animation: raySpín 8s linear infinite;
  }
  @keyframes raySpín { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

  /* moon */
  #moon {
    position: absolute;
    width: 55px; height: 55px;
    border-radius: 50%;
    background: #fffde7;
    top: 55px; right: 95px;
    box-shadow: 0 0 20px rgba(255,253,231,0.6);
    opacity: 1;
    transition: all 1.8s ease;
  }
  #moon::after {
    content:'';
    position: absolute;
    width: 42px; height: 42px;
    border-radius: 50%;
    background: #2d1b69;
    top: -4px; right: -6px;
  }
  #stage.day #moon { opacity: 0; }
  #stage.day #sun { top: 40px; right: 80px; }

  /* ===== CLOUDS ===== */
  .cloud {
    position: absolute;
    border-radius: 50px;
    animation: cloudDrift linear infinite;
  }
  .cloud::before, .cloud::after {
    content:'';
    position: absolute;
    background: inherit;
    border-radius: 50%;
  }
  #stage:not(.day) .cloud { background: rgba(255,255,255,0.12); }
  #stage.day .cloud { background: rgba(255,255,255,0.92); }
  .cloud { transition: background 1.5s; }

  .cl1{width:130px;height:44px;top:55px;left:-160px;animation-duration:20s;animation-delay:0s;}
  .cl1::before{width:65px;height:65px;top:-32px;left:22px;}
  .cl1::after{width:90px;height:55px;top:-26px;left:52px;}
  .cl2{width:95px;height:32px;top:100px;left:-120px;animation-duration:28s;animation-delay:5s;}
  .cl2::before{width:52px;height:52px;top:-26px;left:12px;}
  .cl2::after{width:64px;height:42px;top:-20px;left:38px;}
  .cl3{width:110px;height:36px;top:130px;left:-140px;animation-duration:23s;animation-delay:10s;}
  .cl3::before{width:56px;height:56px;top:-28px;left:16px;}
  .cl3::after{width:72px;height:46px;top:-22px;left:44px;}
  @keyframes cloudDrift{from{left:-170px}to{left:720px}}

  /* ===== MOUNTAINS ===== */
  #mountains {
    position: absolute;
    bottom: 130px; left: 0; right: 0;
    height: 240px;
  }
  .mt {
    position: absolute; bottom: 0;
    width: 0; height: 0;
    border-style: solid;
    border-color: transparent;
    filter: none;
  }
  .mt-bg1 { border-width: 0 160px 200px 160px; border-bottom-color: #2e4a22; left: -30px; }
  .mt-bg2 { border-width: 0 180px 220px 180px; border-bottom-color: #233d18; left: 130px; }
  .mt-bg3 { border-width: 0 170px 210px 170px; border-bottom-color: #1e3514; right: -30px; }
  .mt-fg1 { border-width: 0 140px 175px 140px; border-bottom-color: #3a5c2a; left: 10px; }
  .mt-fg2 { border-width: 0 130px 165px 130px; border-bottom-color: #456b31; left: 290px; }
  .mt-fg3 { border-width: 0 150px 185px 150px; border-bottom-color: #3a5c2a; right: 10px; }

  /* snow caps */
  .snow { border-bottom-color: #e8f5e9 !important; }
  .snow1 { border-width: 0 36px 48px 36px; position: absolute; }
  .snow1.s1 { left: 114px; bottom: 128px; }
  .snow1.s2 { left: 423px; bottom: 118px; }
  .snow1.s3 { right: 122px; bottom: 137px; }

  /* ===== GROUND ===== */
  #ground {
    position: absolute;
    bottom: 0; left: 0; right: 0; height: 145px;
    background: linear-gradient(180deg, #4caf50 0%, #388e3c 40%, #2e7d32 100%);
    border-radius: 0 0 28px 28px;
  }
  /* small hills */
  #ground::before {
    content:'';
    position: absolute;
    top: -28px; left: -20px; right: -20px; height: 60px;
    background: #43a047;
    border-radius: 50% 50% 0 0 / 100% 100% 0 0;
  }

  /* ===== TREES ===== */
  .tree {
    position: absolute;
    bottom: 125px;
    display: flex; flex-direction: column; align-items: center;
    animation: treeGrow 1s cubic-bezier(.34,1.56,.64,1) both;
    transform-origin: bottom center;
  }
  @keyframes treeGrow{from{transform:scaleY(0)}to{transform:scaleY(1)}}

  .treetop {
    width: 0; height: 0;
    border-style: solid;
    border-color: transparent;
    border-bottom-color: #2d6a1a;
  }
  .treetop2 { border-bottom-color: #35801e; margin-bottom: -18px; }
  .treetop3 { border-bottom-color: #3d9623; }
  .trunk { background: #5d4037; border-radius: 2px; }

  .tr1 { left: 30px; animation-delay:.15s; }
  .tr2 { left: 85px; animation-delay:.3s; }
  .tr3 { left: 560px; animation-delay:.2s; }
  .tr4 { left: 610px; animation-delay:.4s; }
  .tr5 { left: 155px; animation-delay:.5s; }

  /* ===== FLOWERS ===== */
  .flower-wrap {
    position: absolute; bottom: 138px;
    display: flex; flex-direction: column; align-items: center;
    animation: flowerPop .7s cubic-bezier(.34,1.8,.64,1) both;
  }
  @keyframes flowerPop{0%{transform:scale(0) rotate(-20deg)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
  .petal-ring { position: relative; width: 26px; height: 26px; }
  .petal {
    position: absolute;
    width: 9px; height: 14px;
    border-radius: 50% 50% 0 0;
    transform-origin: bottom center;
    bottom: 50%; left: calc(50% - 4.5px);
  }
  .flower-center {
    position: absolute; width: 10px; height: 10px;
    border-radius: 50%; background: #FFD600;
    top: 50%; left: 50%; transform: translate(-50%,-50%);
    z-index: 2;
  }
  .flower-stem { width: 3px; border-radius: 2px; background: #388e3c; }
  .flower-leaf {
    width: 10px; height: 7px;
    background: #4caf50;
    border-radius: 50% 0 50% 0;
    position: absolute;
  }

  /* ===== BUTTERFLIES ===== */
  .butterfly {
    position: absolute;
    font-size: 20px;
    animation: butterflyFly ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes butterflyFly {
    0%{transform:translate(0,0) rotate(0deg) scale(1)}
    25%{transform:translate(30px,-25px) rotate(8deg) scale(1.1)}
    50%{transform:translate(-20px,-40px) rotate(-5deg) scale(0.95)}
    75%{transform:translate(45px,-15px) rotate(12deg) scale(1.05)}
    100%{transform:translate(0,0) rotate(0deg) scale(1)}
  }
  .bf1{top:200px;left:200px;animation-duration:7s;animation-delay:0s;}
  .bf2{top:240px;left:420px;animation-duration:9s;animation-delay:2s;}
  .bf3{top:170px;left:340px;animation-duration:11s;animation-delay:4s;}

  /* ===== BIRDS ===== */
  .bird {
    position: absolute;
    animation: birdFly linear infinite;
    pointer-events: none;
  }
  @keyframes birdFly{
    0%{left:-60px;transform:translateY(0)}
    30%{transform:translateY(-12px)}
    60%{transform:translateY(6px)}
    100%{left:760px;transform:translateY(0)}
  }
  .bird svg { transition: transform 0.3s; }
  .bd1{top:75px;animation-duration:14s;animation-delay:1s;}
  .bd2{top:60px;animation-duration:19s;animation-delay:6s;}
  .bd3{top:90px;animation-duration:22s;animation-delay:11s;}

  /* ===== RIVER ===== */
  #river {
    position: absolute;
    bottom: 28px; left: 180px; right: 180px; height: 32px;
    background: linear-gradient(90deg, #29b6f6, #4fc3f7, #81d4fa, #4fc3f7, #29b6f6);
    border-radius: 50%;
    animation: riverFlow 3s ease-in-out infinite;
    opacity: 0.75;
  }
  @keyframes riverFlow{0%,100%{transform:scaleX(1)}50%{transform:scaleX(1.03)}}

  /* ===== RIPPLE FX ===== */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    pointer-events: none;
    animation: rippleOut .9s ease-out forwards;
  }
  @keyframes rippleOut{
    0%{width:0;height:0;opacity:1;transform:translate(-50%,-50%)}
    100%{width:220px;height:220px;opacity:0;transform:translate(-50%,-50%)}
  }

  /* ===== FLOATING HEARTS ===== */
  .fheart {
    position: absolute;
    font-size: 18px;
    pointer-events: none;
    animation: heartFloat 3.5s ease-out forwards;
  }
  @keyframes heartFloat{
    0%{opacity:1;transform:translateY(0) scale(1)}
    100%{opacity:0;transform:translateY(-200px) scale(0.4)}
  }

  /* ===== FIREFLIES (night) ===== */
  .firefly {
    position: absolute;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #fffde7;
    animation: fireflyMove ease-in-out infinite, fireflyGlow ease-in-out infinite;
    box-shadow: 0 0 6px #fffde7;
    opacity: 0;
    transition: opacity 1.5s;
  }
  #stage:not(.day) .firefly { opacity: 1; }
  @keyframes fireflyMove{
    0%{transform:translate(0,0)}25%{transform:translate(30px,-20px)}
    50%{transform:translate(-15px,-35px)}75%{transform:translate(20px,-10px)}100%{transform:translate(0,0)}
  }
  @keyframes fireflyGlow{0%,100%{box-shadow:0 0 4px #fffde7}50%{box-shadow:0 0 14px #fffde7,0 0 24px rgba(255,253,231,0.4)}}

  /* ===== INTRO SCREEN ===== */
  #intro {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 20;
    background: linear-gradient(135deg, #1a0533 0%, #311b92 50%, #1a237e 100%);
    transition: opacity 0.8s ease, visibility 0.8s;
    border-radius: 28px;
  }
  #intro.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

  .intro-icon {
    font-size: 72px;
    animation: introFloat 2.2s ease-in-out infinite;
    filter: drop-shadow(0 0 20px rgba(255,182,193,0.8));
  }
  @keyframes introFloat{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-14px) rotate(3deg)}}

  .intro-title {
    font-size: 26px; font-weight: 700;
    color: #fff;
    margin: 16px 0 8px;
    text-shadow: 0 0 20px rgba(255,182,193,0.6);
    letter-spacing: 1px;
  }
  .intro-sub {
    font-size: 14px;
    color: rgba(255,255,255,0.6);
    margin-bottom: 36px;
  }
  .intro-btn {
    padding: 14px 40px;
    border: none; border-radius: 50px;
    background: linear-gradient(135deg, #e91e63, #ff5722);
    color: white; font-size: 16px; font-weight: 600;
    cursor: pointer; letter-spacing: 0.5px;
    box-shadow: 0 4px 24px rgba(233,30,99,0.45);
    transition: transform 0.2s, box-shadow 0.2s;
    animation: btnPulse 2s ease-in-out infinite;
  }
  .intro-btn:hover { transform: scale(1.06); box-shadow: 0 6px 32px rgba(233,30,99,0.6); }
  @keyframes btnPulse{0%,100%{box-shadow:0 4px 24px rgba(233,30,99,0.45)}50%{box-shadow:0 4px 40px rgba(233,30,99,0.7)}}

  .sparkles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; border-radius: 28px; }
  .sp {
    position: absolute;
    font-size: 14px;
    animation: spFloat linear infinite;
    opacity: 0;
  }
  @keyframes spFloat{0%{opacity:0;transform:translateY(100px)}20%{opacity:1}80%{opacity:1}100%{opacity:0;transform:translateY(-60px)}}

  /* ===== LOVE MESSAGE ===== */
  #love-msg {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 14px 20px 18px;
    background: linear-gradient(180deg, transparent, rgba(0,40,15,0.8));
    border-radius: 0 0 28px 28px;
    text-align: center;
    z-index: 10;
    pointer-events: none;
  }
  .love-text {
    font-size: 17px; font-weight: 600;
    color: #fff;
    text-shadow: 0 2px 10px rgba(0,0,0,0.6);
    opacity: 0;
    transform: translateY(16px);
    animation: loveAppear 1s ease-out 1.2s forwards;
  }
  @keyframes loveAppear{to{opacity:1;transform:translateY(0)}}

  /* ===== TOGGLE DAY/NIGHT ===== */
  #toggle-btn {
    position: absolute;
    top: 14px; left: 14px;
    padding: 7px 14px;
    border: none; border-radius: 50px;
    background: rgba(255,255,255,0.18);
    color: white; font-size: 13px;
    cursor: pointer; z-index: 15;
    backdrop-filter: blur(6px);
    transition: background 0.3s;
    letter-spacing: 0.3px;
  }
  #toggle-btn:hover { background: rgba(255,255,255,0.28); }

  /* ===== PARTICLE CANVAS ===== */
  #petals-canvas {
    position: absolute; inset: 0;
    pointer-events: none; z-index: 5;
    border-radius: 28px;
  }
</style>
</head>
<body>

<div id="stage">

  <!-- Intro screen -->
  <div id="intro">
    <div class="sparkles" id="sparkles"></div>
    <div class="intro-icon">🌸</div>
    <p class="intro-title">Vườn Thiên Nhiên Kỳ Diệu</p>
    <p class="intro-sub">Nhấn để mở cánh cửa thiên nhiên</p>
    <button class="intro-btn" onclick="startScene()">✨ Khám phá ngay ✨</button>
  </div>

  <!-- Day/Night toggle -->
  <button id="toggle-btn" onclick="toggleDayNight(event)">🌙 Ban đêm</button>

  <!-- Sky -->
  <div id="sky"></div>

  <!-- Stars -->
  <div id="stars"></div>

  <!-- Moon & Sun -->
  <div id="moon"></div>
  <div id="sun">
    <div class="ray" style="transform:rotate(0deg) translateX(-2px)"></div>
    <div class="ray" style="transform:rotate(45deg) translateX(-2px)"></div>
    <div class="ray" style="transform:rotate(90deg) translateX(-2px)"></div>
    <div class="ray" style="transform:rotate(135deg) translateX(-2px)"></div>
    <div class="ray" style="transform:rotate(180deg) translateX(-2px)"></div>
    <div class="ray" style="transform:rotate(225deg) translateX(-2px)"></div>
    <div class="ray" style="transform:rotate(270deg) translateX(-2px)"></div>
    <div class="ray" style="transform:rotate(315deg) translateX(-2px)"></div>
  </div>

  <!-- Clouds -->
  <div class="cloud cl1"></div>
  <div class="cloud cl2"></div>
  <div class="cloud cl3"></div>

  <!-- Birds -->
  <div class="bird bd1">
    <svg width="28" height="14" viewBox="0 0 28 14" fill="none">
      <path d="M14 7 Q7 0 0 4" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
      <path d="M14 7 Q21 0 28 4" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
    </svg>
  </div>
  <div class="bird bd2">
    <svg width="22" height="11" viewBox="0 0 22 11" fill="none">
      <path d="M11 5.5 Q5.5 0 0 3" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      <path d="M11 5.5 Q16.5 0 22 3" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    </svg>
  </div>
  <div class="bird bd3">
    <svg width="18" height="9" viewBox="0 0 18 9" fill="none">
      <path d="M9 4.5 Q4.5 0 0 2.5" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      <path d="M9 4.5 Q13.5 0 18 2.5" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    </svg>
  </div>

  <!-- Mountains -->
  <div id="mountains">
    <div class="mt mt-bg1"></div>
    <div class="mt mt-bg2"></div>
    <div class="mt mt-bg3"></div>
    <div class="mt mt-fg1"></div>
    <div class="mt mt-fg2"></div>
    <div class="mt mt-fg3"></div>
    <div class="mt snow snow1 s1"></div>
    <div class="mt snow snow1 s2"></div>
    <div class="mt snow snow1 s3"></div>
  </div>

  <!-- Ground -->
  <div id="ground"></div>

  <!-- River -->
  <div id="river"></div>

  <!-- Trees -->
  <div class="tree tr1" style="animation-delay:.15s">
    <div class="treetop treetop3" style="border-width:0 22px 44px 22px;border-bottom-color:#1b5e20"></div>
    <div class="treetop treetop2" style="border-width:0 26px 52px 26px;margin-bottom:-22px;border-bottom-color:#2e7d32"></div>
    <div class="treetop" style="border-width:0 30px 60px 30px"></div>
    <div class="trunk" style="width:10px;height:32px"></div>
  </div>
  <div class="tree tr2" style="animation-delay:.3s">
    <div class="treetop treetop3" style="border-width:0 18px 36px 18px;border-bottom-color:#1b5e20"></div>
    <div class="treetop treetop2" style="border-width:0 22px 44px 22px;margin-bottom:-18px;border-bottom-color:#2e7d32"></div>
    <div class="treetop" style="border-width:0 26px 52px 26px"></div>
    <div class="trunk" style="width:9px;height:26px"></div>
  </div>
  <div class="tree tr3" style="animation-delay:.2s">
    <div class="treetop treetop3" style="border-width:0 22px 44px 22px;border-bottom-color:#1b5e20"></div>
    <div class="treetop treetop2" style="border-width:0 26px 52px 26px;margin-bottom:-22px;border-bottom-color:#2e7d32"></div>
    <div class="treetop" style="border-width:0 30px 60px 30px"></div>
    <div class="trunk" style="width:10px;height:30px"></div>
  </div>
  <div class="tree tr4" style="animation-delay:.4s">
    <div class="treetop treetop3" style="border-width:0 18px 36px 18px;border-bottom-color:#1b5e20"></div>
    <div class="treetop treetop2" style="border-width:0 22px 44px 22px;margin-bottom:-18px;border-bottom-color:#2e7d32"></div>
    <div class="treetop" style="border-width:0 26px 52px 26px"></div>
    <div class="trunk" style="width:8px;height:24px"></div>
  </div>
  <div class="tree tr5" style="animation-delay:.5s">
    <div class="treetop treetop3" style="border-width:0 16px 32px 16px;border-bottom-color:#1b5e20"></div>
    <div class="treetop treetop2" style="border-width:0 20px 40px 20px;margin-bottom:-16px;border-bottom-color:#2e7d32"></div>
    <div class="treetop" style="border-width:0 24px 48px 24px"></div>
    <div class="trunk" style="width:8px;height:22px"></div>
  </div>

  <!-- Flowers (created by JS) -->
  <div id="flowers"></div>

  <!-- Butterflies -->
  <div class="butterfly bf1">🦋</div>
  <div class="butterfly bf2">🦋</div>
  <div class="butterfly bf3">🦋</div>

  <!-- Fireflies -->
  <div id="fireflies"></div>

  <!-- Falling petals canvas -->
  <canvas id="petals-canvas" width="700" height="500"></canvas>

  <!-- Love message -->
  <div id="love-msg">
    <p class="love-text" id="love-text">oke thảo my </p>
  </div>

</div>

<script>
const stage = document.getElementById('stage');
const intro = document.getElementById('intro');
const toggleBtn = document.getElementById('toggle-btn');
let isDay = false;
let sceneStarted = false;
const MESSAGES = [
  'oke thảo my ',
];
let msgIdx = 0;

function startScene() {
  intro.classList.add('hidden');
  sceneStarted = true;
  isDay = true;
  stage.classList.add('day');
  toggleBtn.textContent = '🌙 Ban đêm';
  createFlowers();
  createStars();
  createFireflies();
  startPetals();
}

function toggleDayNight(e) {
  if (!sceneStarted) return;
  e.stopPropagation();
  isDay = !isDay;
  stage.classList.toggle('day', isDay);
  toggleBtn.textContent = isDay ? '🌙 Ban đêm' : '☀️ Ban ngày';
  addRipple(e);
}

stage.addEventListener('click', function(e) {
  if (!sceneStarted) return;
  addRipple(e);
  spawnHearts(e);
  msgIdx = (msgIdx + 1) % MESSAGES.length;
  const lt = document.getElementById('love-text');
  lt.style.animation = 'none';
  lt.offsetHeight;
  lt.textContent = MESSAGES[msgIdx];
  lt.style.animation = 'loveAppear .6s ease-out forwards';
});

function addRipple(e) {
  const rect = stage.getBoundingClientRect();
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.left = (e.clientX - rect.left) + 'px';
  r.style.top = (e.clientY - rect.top) + 'px';
  stage.appendChild(r);
  setTimeout(() => r.remove(), 900);
}

function spawnHearts(e) {
  const rect = stage.getBoundingClientRect();
  const hearts = ['💗','💕','💖','💝','💓','💞'];
  for (let i = 0; i < 6; i++) {
    const h = document.createElement('div');
    h.className = 'fheart';
    h.textContent = hearts[Math.floor(Math.random()*hearts.length)];
    h.style.left = (e.clientX - rect.left + (Math.random()-0.5)*80) + 'px';
    h.style.top = (e.clientY - rect.top + (Math.random()-0.5)*40) + 'px';
    h.style.animationDelay = (Math.random()*0.4) + 's';
    h.style.fontSize = (14 + Math.random()*12) + 'px';
    h.style.zIndex = 12;
    stage.appendChild(h);
    setTimeout(() => h.remove(), 4000);
  }
}

function createFlowers() {
  const container = document.getElementById('flowers');
  const configs = [
    {left:220, color:'#FF80AB', delay:.7},
    {left:258, color:'#FFD740', delay:.9},
    {left:296, color:'#FF6E40', delay:1.1},
    {left:334, color:'#CE93D8', delay:1.3},
    {left:372, color:'#FF80AB', delay:1.5},
    {left:410, color:'#80DEEA', delay:1.7},
    {left:448, color:'#A5D6A7', delay:1.9},
  ];
  configs.forEach(cfg => {
    const wrap = document.createElement('div');
    wrap.className = 'flower-wrap';
    wrap.style.left = cfg.left + 'px';
    wrap.style.animationDelay = cfg.delay + 's';

    const ring = document.createElement('div');
    ring.className = 'petal-ring';
    const angles = [0,72,144,216,288];
    angles.forEach(a => {
      const p = document.createElement('div');
      p.className = 'petal';
      p.style.background = cfg.color;
      p.style.transform = `rotate(${a}deg) translateX(-50%)`;
      p.style.transformOrigin = 'bottom center';
      p.style.bottom = '50%';
      p.style.left = 'calc(50% - 4.5px)';
      ring.appendChild(p);
    });
    const center = document.createElement('div');
    center.className = 'flower-center';
    ring.appendChild(center);

    const stemH = 26 + Math.floor(Math.random()*16);
    const stem = document.createElement('div');
    stem.className = 'flower-stem';
    stem.style.height = stemH + 'px';

    wrap.appendChild(ring);
    wrap.appendChild(stem);
    container.appendChild(wrap);
  });
}

/* ===== Falling petals canvas ===== */
function startPetals() {
  const canvas = document.getElementById('petals-canvas');
  const ctx = canvas.getContext('2d');
  const petals = [];
  const colors = ['#FF80AB','#FFD740','#CE93D8','#80DEEA','#FFCCBC','#F48FB1','#B39DDB'];

  function spawnPetal() {
    petals.push({
      x: Math.random()*700,
      y: -20,
      vx: (Math.random()-0.5)*1.2,
      vy: 0.8 + Math.random()*1.2,
      r: Math.random()*Math.PI*2,
      vr: (Math.random()-0.5)*0.06,
      size: 4 + Math.random()*6,
      color: colors[Math.floor(Math.random()*colors.length)],
      opacity: 0.7 + Math.random()*0.3,
    });
  }

  let spawnTimer = 0;
  function drawPetal(p) {
    ctx.save();
    ctx.globalAlpha = p.opacity;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.r);
    ctx.beginPath();
    ctx.ellipse(0, 0, p.size, p.size*0.55, 0, 0, Math.PI*2);
    ctx.fillStyle = p.color;
    ctx.fill();
    ctx.restore();
  }

  function loop() {
    ctx.clearRect(0, 0, 700, 500);
    spawnTimer++;
    if (spawnTimer % 18 === 0) spawnPetal();
    if (petals.length > 35) petals.shift();
    for (let p of petals) {
      p.x += p.vx + Math.sin(p.y*0.02)*0.5;
      p.y += p.vy;
      p.r += p.vr;
      drawPetal(p);
    }
    requestAnimationFrame(loop);
  }
  loop();
}
